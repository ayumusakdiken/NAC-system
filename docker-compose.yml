services:
  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    healthcheck:
      test: ["CMD", "radtest", "health", "check", "localhost", "0", "testing123"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nac-network
    volumes:
      - ./config/freeradius/clients.conf:/etc/freeradius/clients.conf
      - ./config/freeradius/mods-enabled/rest:/etc/freeradius/mods-enabled/rest
      - ./config/freeradius/sites-enabled/default:/etc/freeradius/sites-enabled/default


  postgres:
    image: postgres:18-alpine
    expose:
      - "5432"
    env_file:
      - path: ./.env
        required: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nac-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql


  redis:
    image: redis:8-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nac-network

    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf


  api:
    image: python:3.13-slim
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nac-network
    volumes:
      - ./api:/app

volumes:
  postgres-data:
  redis-data:

networks:
  nac-network:
    driver: bridge
